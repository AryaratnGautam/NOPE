<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>NOPE — Don't Touch The Forbidden Color</title>
<style>
  :root {
    --bg-0: #07070b;
    --bg-1: #0d0d14;
    --bg-2: #14141d;
    --glass: rgba(255,255,255,0.04);
    --glass-strong: rgba(255,255,255,0.07);
    --stroke: rgba(255,255,255,0.08);
    --text: #f3f4f8;
    --muted: #8a8d99;
    --accent: #ffffff;
    --red:    #ff3b5c;
    --blue:   #3b82ff;
    --green:  #25e08a;
    --yellow: #ffd23b;
    --purple: #a855f7;
    --cyan:   #22d3ee;
    --orange: #ff8a3d;
    --pink:   #ff5fa8;
    --safe-dim: rgba(255,255,255,0.06);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: radial-gradient(1200px 800px at 50% -10%, #1a1a26 0%, var(--bg-0) 55%, #000 100%);
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }

  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Top HUD */
  .hud {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    padding: 14px 16px 8px;
    gap: 10px;
  }
  .hud .cell { display: flex; flex-direction: column; gap: 2px; }
  .hud .cell.center { align-items: center; }
  .hud .cell.right  { align-items: flex-end; }
  .hud .label { font-size: 10px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
  .hud .value { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
  .hud .value.mono { font-variant-numeric: tabular-nums; }

  /* Warning banner */
  .warning {
    margin: 6px 16px 14px;
    padding: 18px 14px;
    border-radius: 22px;
    background: linear-gradient(180deg, var(--glass-strong), var(--glass));
    border: 1px solid var(--stroke);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    position: relative;
    overflow: hidden;
  }
  .warning::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(60% 100% at 50% 0%, var(--warning-glow, transparent) 0%, transparent 70%);
    opacity: 0.55; pointer-events: none;
  }
  .warning .tag {
    font-size: 10px; letter-spacing: 0.32em; color: var(--muted); text-transform: uppercase;
  }
  .warning .title {
    margin-top: 4px;
    font-size: clamp(22px, 6.2vw, 34px);
    font-weight: 900;
    letter-spacing: 0.02em;
    text-shadow: 0 0 18px var(--warning-glow, transparent);
  }
  .warning .title .col {
    color: var(--warning-color, #fff);
    text-shadow: 0 0 22px var(--warning-glow, rgba(255,255,255,0.4));
  }

  /* Board */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 16px 12px;
    min-height: 0;
  }
  .board {
    display: grid;
    gap: clamp(6px, 1.8vw, 12px);
    width: min(94vw, 460px);
    aspect-ratio: var(--ar, 1 / 1);
    perspective: 800px;
  }
  .tile {
    position: relative;
    border-radius: 18px;
    background: var(--safe-dim);
    border: 1px solid var(--stroke);
    transition: transform 120ms ease, background 240ms ease, box-shadow 240ms ease, border-color 240ms ease;
    cursor: pointer;
    overflow: hidden;
    will-change: transform, box-shadow;
  }
  .tile::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(120% 120% at 50% 0%, rgba(255,255,255,0.18) 0%, transparent 55%);
    opacity: 0; transition: opacity 200ms ease;
    pointer-events: none;
  }
  .tile.active {
    background: var(--tile-color, #fff);
    border-color: rgba(255,255,255,0.25);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.18) inset,
      0 0 22px var(--tile-glow, rgba(255,255,255,0.5)),
      0 10px 40px var(--tile-glow, rgba(255,255,255,0.25));
    animation: pop 180ms ease-out, pulse 1.2s ease-in-out 180ms infinite;
  }
  .tile.active::after { opacity: 1; }
  .tile.tap { transform: scale(0.94); }
  .tile.fade { animation: fade 220ms ease forwards; }

  @keyframes pop {
    0%   { transform: scale(0.7); }
    60%  { transform: scale(1.06); }
    100% { transform: scale(1.0); }
  }
  @keyframes pulse {
    0%, 100% { filter: brightness(1.0); }
    50%      { filter: brightness(1.15); }
  }
  @keyframes fade {
    to { opacity: 0; transform: scale(0.85); }
  }

  /* Floating score popups */
  .float {
    position: absolute;
    pointer-events: none;
    font-weight: 800;
    font-size: 18px;
    color: #fff;
    text-shadow: 0 0 10px currentColor;
    animation: floatUp 700ms ease-out forwards;
    z-index: 5;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translate(-50%, 0) scale(0.8); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1.1); }
  }

  /* Bottom controls */
  .controls {
    display: flex; gap: 10px; padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
    justify-content: center;
  }
  .btn {
    appearance: none; border: 1px solid var(--stroke);
    background: var(--glass-strong);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    cursor: pointer;
    transition: transform 120ms ease, background 200ms ease, border-color 200ms ease;
    min-width: 96px;
  }
  .btn:active { transform: scale(0.96); }
  .btn.primary {
    background: linear-gradient(180deg, #ffffff, #d6d6dc);
    color: #07070b;
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 10px 30px rgba(255,255,255,0.15);
  }
  .btn.ghost { background: transparent; }
  .btn .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background: var(--green); margin-right: 8px; box-shadow: 0 0 10px var(--green); }

  /* Overlays */
  .overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(60% 60% at 50% 40%, rgba(0,0,0,0.55), rgba(0,0,0,0.85));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    z-index: 10;
    padding: 24px;
    animation: fadeIn 300ms ease;
  }
  .overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .panel {
    width: min(440px, 100%);
    border-radius: 28px;
    padding: 26px 22px;
    background: linear-gradient(180deg, rgba(22,22,30,0.85), rgba(12,12,18,0.85));
    border: 1px solid var(--stroke);
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    text-align: center;
  }
  .brand {
    font-size: 12px; letter-spacing: 0.4em; color: var(--muted); text-transform: uppercase;
  }
  .logo {
    font-size: clamp(56px, 16vw, 96px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    margin: 6px 0 4px;
    background: linear-gradient(180deg, #fff 0%, #b9b9c8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 50px rgba(255,255,255,0.15);
  }
  .tagline { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

  .row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 10px 0 6px; }
  .chip {
    border: 1px solid var(--stroke);
    background: var(--glass);
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
    transition: transform 120ms ease, background 200ms ease, border-color 200ms ease;
    color: var(--text);
  }
  .chip:active { transform: scale(0.96); }
  .chip.selected {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.45);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15) inset, 0 0 22px rgba(255,255,255,0.08);
  }
  .section-label { font-size: 10px; color: var(--muted); letter-spacing: 0.32em; text-transform: uppercase; margin-top: 14px; }

  .stats { display: flex; justify-content: space-around; margin: 18px 0 8px; }
  .stat .k { font-size: 10px; color: var(--muted); letter-spacing: 0.28em; text-transform: uppercase; }
  .stat .v { font-size: 22px; font-weight: 800; }

  .big-btn {
    margin-top: 18px;
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    background: linear-gradient(180deg, #ffffff, #d4d4dc);
    color: #07070b;
    font-size: 14px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
    border: none; cursor: pointer;
    box-shadow: 0 14px 36px rgba(255,255,255,0.14);
    transition: transform 120ms ease;
  }
  .big-btn:active { transform: scale(0.98); }

  .small-link {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent; border: none;
  }
  .small-link:hover { color: var(--text); }

  /* Countdown */
  .countdown {
    font-size: clamp(80px, 22vw, 140px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
    animation: cdPop 800ms ease forwards;
  }
  @keyframes cdPop {
    0%   { transform: scale(0.4); opacity: 0; }
    30%  { opacity: 1; }
    70%  { transform: scale(1.0); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* Game over shake */
  .shake { animation: shake 360ms cubic-bezier(.36,.07,.19,.97) both; }
  @keyframes shake {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    20%, 80% { transform: translate3d(4px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
    40%, 60% { transform: translate3d(6px, 0, 0); }
  }

  .flash-red {
    position: fixed; inset: 0; pointer-events: none; z-index: 9;
    background: radial-gradient(circle at 50% 50%, rgba(255,59,92,0.35), transparent 60%);
    opacity: 0; transition: opacity 220ms ease;
  }
  .flash-red.on { opacity: 1; }

  /* Time bar */
  .timebar {
    height: 4px; margin: 0 16px 0;
    background: var(--glass);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--stroke);
  }
  .timebar > div {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #fff, #c9c9d2);
    transform-origin: left center;
    transition: transform 120ms linear, background 200ms ease;
  }
  .timebar.warn > div { background: linear-gradient(90deg, #ffd23b, #ff8a3d); }
  .timebar.crit > div { background: linear-gradient(90deg, #ff8a3d, #ff3b5c); }

  .footer { color: var(--muted); font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; text-align: center; padding-bottom: 4px; }

  @media (max-height: 640px) {
    .warning { padding: 12px 12px; }
    .warning .title { font-size: 22px; }
  }
</style>
</head>
<body>
  <div id="app">
    <!-- HUD -->
    <div class="hud">
      <div class="cell">
        <div class="label">Level</div>
        <div class="value mono" id="lvl">1</div>
      </div>
      <div class="cell center">
        <div class="label">Time</div>
        <div class="value mono" id="time">30.0</div>
      </div>
      <div class="cell right">
        <div class="label">Score · Best</div>
        <div class="value mono"><span id="score">0</span> · <span id="best">0</span></div>
      </div>
    </div>

    <!-- Time bar -->
    <div class="timebar" id="timebar"><div id="timefill"></div></div>

    <!-- Warning -->
    <div class="warning" id="warning">
      <div class="tag">Forbidden Color</div>
      <div class="title">DON'T TOUCH <span class="col" id="badcolor">RED</span></div>
    </div>

    <!-- Board -->
    <div class="stage">
      <div class="board" id="board"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn ghost" id="btnPause">Pause</button>
      <button class="btn ghost" id="btnMenu">Menu</button>
    </div>
  </div>

  <div class="flash-red" id="flash"></div>

  <!-- Main Menu Overlay -->
  <div class="overlay" id="menu">
    <div class="panel">
      <div class="brand">Arcade · Reaction</div>
      <div class="logo">NOPE</div>
      <div class="tagline">Don't touch the forbidden color.</div>

      <div class="section-label">Board Size</div>
      <div class="row" id="sizeRow">
        <button class="chip" data-size="3x3">3 × 3</button>
        <button class="chip selected" data-size="3x4">3 × 4</button>
        <button class="chip" data-size="4x4">4 × 4</button>
      </div>

      <div class="stats">
        <div class="stat"><div class="k">Best</div><div class="v mono" id="menuBest">0</div></div>
        <div class="stat"><div class="k">Top Lvl</div><div class="v mono" id="menuLvl">1</div></div>
        <div class="stat"><div class="k">Sound</div><div class="v" id="sndState">On</div></div>
      </div>

      <button class="big-btn" id="btnStart">Play</button>
      <button class="small-link" id="btnSound">Toggle Sound</button>
    </div>
  </div>

  <!-- Pause Overlay -->
  <div class="overlay hidden" id="pause">
    <div class="panel">
      <div class="brand">Paused</div>
      <div class="logo" style="font-size: clamp(40px,10vw,64px)">‖</div>
      <div class="tagline">Take a breath.</div>
      <button class="big-btn" id="btnResume">Resume</button>
      <button class="small-link" id="btnQuit">Back to Menu</button>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div class="overlay hidden" id="over">
    <div class="panel">
      <div class="brand" id="overReason">Game Over</div>
      <div class="logo" style="font-size: clamp(48px,12vw,80px); background: linear-gradient(180deg,#ff3b5c,#a8264a); -webkit-background-clip:text; background-clip:text; color:transparent;">NOPE</div>
      <div class="tagline" id="overSub">You touched the forbidden color.</div>
      <div class="stats">
        <div class="stat"><div class="k">Score</div><div class="v mono" id="overScore">0</div></div>
        <div class="stat"><div class="k">Level</div><div class="v mono" id="overLvl">1</div></div>
        <div class="stat"><div class="k">Best</div><div class="v mono" id="overBest">0</div></div>
      </div>
      <button class="big-btn" id="btnAgain">Play Again</button>
      <button class="small-link" id="btnHome">Main Menu</button>
    </div>
  </div>

  <!-- Countdown Overlay -->
  <div class="overlay hidden" id="cd">
    <div class="countdown" id="cdNum">3</div>
  </div>

<script>
(() => {
  'use strict';

  // ---------- State ----------
  const PALETTE = [
    { name: 'RED',    css: 'var(--red)',    rgb: '#ff3b5c', glow: 'rgba(255,59,92,0.55)' },
    { name: 'BLUE',   css: 'var(--blue)',   rgb: '#3b82ff', glow: 'rgba(59,130,255,0.55)' },
    { name: 'GREEN',  css: 'var(--green)',  rgb: '#25e08a', glow: 'rgba(37,224,138,0.55)' },
    { name: 'YELLOW', css: 'var(--yellow)', rgb: '#ffd23b', glow: 'rgba(255,210,59,0.55)' },
    { name: 'PURPLE', css: 'var(--purple)', rgb: '#a855f7', glow: 'rgba(168,85,247,0.55)' },
    { name: 'CYAN',   css: 'var(--cyan)',   rgb: '#22d3ee', glow: 'rgba(34,211,238,0.55)' },
    { name: 'ORANGE', css: 'var(--orange)', rgb: '#ff8a3d', glow: 'rgba(255,138,61,0.55)' },
    { name: 'PINK',   css: 'var(--pink)',   rgb: '#ff5fa8', glow: 'rgba(255,95,168,0.55)' },
  ];

  const state = {
    boardSize: '3x4',
    cols: 3, rows: 4,
    level: 1,
    score: 0,
    best: parseInt(localStorage.getItem('nope_best') || '0', 10),
    bestLevel: parseInt(localStorage.getItem('nope_best_lvl') || '1', 10),
    soundOn: localStorage.getItem('nope_sound') !== 'off',
    forbidden: null,
    safePool: [],
    multiplier: 1.0,
    timeLeft: 30,
    levelDuration: 30,
    running: false,
    paused: false,
    tiles: [], // dom refs
    tileStates: [], // { active, color, expiresAt }
    activations: 0,
    streak: 0,
    lastSpawn: 0,
    spawnInterval: 900,
    activeWindow: 1200,
    forbiddenChance: 0.25,
  };

  // ---------- DOM ----------
  const $ = (id) => document.getElementById(id);
  const board = $('board');
  const lvlEl = $('lvl'), timeEl = $('time'), scoreEl = $('score'), bestEl = $('best');
  const warning = $('warning'), badcolor = $('badcolor');
  const menu = $('menu'), pauseOv = $('pause'), overOv = $('over'), cdOv = $('cd'), cdNum = $('cdNum');
  const overScore = $('overScore'), overLvl = $('overLvl'), overBest = $('overBest');
  const menuBest = $('menuBest'), menuLvl = $('menuLvl'), sndState = $('sndState');
  const timefill = $('timefill'), timebar = $('timebar');
  const flash = $('flash');

  // ---------- Audio ----------
  let actx = null;
  function ensureAudio() {
    if (!state.soundOn) return null;
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch { actx = null; }
    }
    if (actx && actx.state === 'suspended') actx.resume();
    return actx;
  }
  function blip({ freq=600, dur=0.08, type='sine', vol=0.06, slide=0 }) {
    const ctx = ensureAudio(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), ctx.currentTime + dur);
    gain.gain.value = 0;
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur + 0.02);
  }
  const sfx = {
    tap:    () => blip({ freq: 720, dur: 0.06, type: 'triangle', vol: 0.05, slide: 220 }),
    miss:   () => blip({ freq: 320, dur: 0.10, type: 'sawtooth', vol: 0.04, slide: -120 }),
    over:   () => { blip({ freq: 220, dur: 0.18, type: 'square', vol: 0.08, slide: -160 });
                    setTimeout(() => blip({ freq: 110, dur: 0.4, type: 'sawtooth', vol: 0.08, slide: -80 }), 90); },
    levelUp:() => { blip({ freq: 520, dur: 0.10, type: 'triangle', vol: 0.06, slide: 280 });
                    setTimeout(()=>blip({ freq: 760, dur: 0.10, type: 'triangle', vol: 0.06, slide: 320 }), 90);
                    setTimeout(()=>blip({ freq: 1040, dur: 0.14, type: 'triangle', vol: 0.06, slide: 240 }), 180); },
    count:  () => blip({ freq: 880, dur: 0.05, type: 'sine', vol: 0.05 }),
    start:  () => blip({ freq: 1320, dur: 0.18, type: 'sine', vol: 0.06, slide: 220 }),
  };

  // ---------- Helpers ----------
  function rand(a, b) { return a + Math.random() * (b - a); }
  function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function setText(el, t) { if (el.textContent !== t) el.textContent = t; }

  function setBoardSize(size) {
    state.boardSize = size;
    const [c, r] = size.split('x').map(Number);
    state.cols = c; state.rows = r;
  }

  function scaleBoardForLevel() {
    // Slight upscale every few levels, capped at 4x6
    const base = state.boardSize.split('x').map(Number);
    let c = base[0], r = base[1];
    const lv = state.level;
    if (lv >= 4) c = Math.min(4, c + 1);
    if (lv >= 7) r = Math.min(6, r + 1);
    if (lv >= 10) c = Math.min(4, c + 0); // keep 4 max
    if (lv >= 12) r = Math.min(6, r + 1);
    state.cols = c; state.rows = r;
  }

  function buildBoard() {
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;
    board.style.gridTemplateRows    = `repeat(${state.rows}, 1fr)`;
    board.style.setProperty('--ar', `${state.cols} / ${state.rows}`);
    state.tiles = []; state.tileStates = [];
    const total = state.cols * state.rows;
    for (let i = 0; i < total; i++) {
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.setAttribute('aria-label', `tile ${i+1}`);
      tile.dataset.idx = i;
      tile.tabIndex = 0;
      tile.addEventListener('pointerdown', (e) => { e.preventDefault(); onTileTap(i, tile); }, { passive: false });
      tile.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onTileTap(i, tile); } });
      board.appendChild(tile);
      state.tiles.push(tile);
      state.tileStates.push({ active: false, isForbidden: false, color: null, expiresAt: 0 });
    }
  }

  function pickForbidden() {
    const c = pick(PALETTE);
    state.forbidden = c;
    badcolor.textContent = c.name;
    document.documentElement.style.setProperty('--warning-color', c.rgb);
    document.documentElement.style.setProperty('--warning-glow', c.glow);
    // Safe pool excludes forbidden
    state.safePool = PALETTE.filter(p => p.name !== c.name);
  }

  function computeDifficulty() {
    const lv = state.level;
    // Spawn interval: starts 900ms, down to ~280ms
    state.spawnInterval = Math.max(260, 900 - (lv - 1) * 55);
    // Active window: starts 1200ms, down to ~520ms
    state.activeWindow = Math.max(480, 1200 - (lv - 1) * 50);
    // Forbidden chance: starts 25%, up to 45%
    state.forbiddenChance = Math.min(0.46, 0.25 + (lv - 1) * 0.015);
    // Level duration
    state.levelDuration = 30 + (lv - 1) * 15;
  }

  // ---------- Activation engine ----------
  function activateTile(now) {
    // Pick an inactive tile
    const inactive = [];
    for (let i = 0; i < state.tileStates.length; i++) {
      if (!state.tileStates[i].active) inactive.push(i);
    }
    if (inactive.length === 0) return;
    const idx = pick(inactive);
    const isForbidden = Math.random() < state.forbiddenChance;
    const col = isForbidden ? state.forbidden : pick(state.safePool);
    const tile = state.tiles[idx];
    const st = state.tileStates[idx];
    st.active = true;
    st.isForbidden = isForbidden;
    st.color = col;
    st.expiresAt = now + state.activeWindow;
    tile.style.setProperty('--tile-color', col.rgb);
    tile.style.setProperty('--tile-glow', col.glow);
    tile.classList.add('active');
    tile.classList.remove('fade');
  }

  function deactivateTile(i, opts = {}) {
    const tile = state.tiles[i];
    const st = state.tileStates[i];
    if (!st.active) return;
    st.active = false; st.isForbidden = false; st.color = null;
    tile.classList.remove('active');
    if (opts.fade) {
      tile.classList.add('fade');
      setTimeout(() => tile.classList.remove('fade'), 230);
    }
  }

  function onTileTap(i, tileEl) {
    if (!state.running || state.paused) return;
    tileEl.classList.add('tap');
    setTimeout(() => tileEl.classList.remove('tap'), 110);
    const st = state.tileStates[i];
    if (!st.active) {
      // misclick on empty -> tiny penalty
      state.multiplier = Math.max(0.5, state.multiplier - 0.05);
      sfx.miss();
      return;
    }
    if (st.isForbidden) {
      // game over
      gameOver('You touched ' + state.forbidden.name + '.');
      return;
    }
    // safe hit
    const remaining = Math.max(0, st.expiresAt - performance.now());
    const ratio = remaining / state.activeWindow;
    const speedBonus = Math.round(50 + 50 * ratio); // 50–100
    const gained = Math.round((10 + speedBonus) * state.multiplier);
    state.score += gained;
    state.streak += 1;
    if (state.streak % 5 === 0) state.multiplier = Math.min(3.0, state.multiplier + 0.1);
    sfx.tap();
    deactivateTile(i);
    showFloat(tileEl, '+' + gained, st.color.rgb);
    updateHud();
  }

  function showFloat(tileEl, text, color) {
    const rect = tileEl.getBoundingClientRect();
    const f = document.createElement('div');
    f.className = 'float';
    f.style.left = (rect.left + rect.width / 2) + 'px';
    f.style.top  = (rect.top + 8) + 'px';
    f.style.color = color;
    f.textContent = text;
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 720);
  }

  // ---------- Game loop ----------
  let rafId = null, lastFrame = 0;
  function loop(ts) {
    if (!state.running) return;
    if (!state.paused) {
      const dt = lastFrame ? (ts - lastFrame) : 16;
      lastFrame = ts;
      tick(ts, dt);
    } else {
      lastFrame = ts;
    }
    rafId = requestAnimationFrame(loop);
  }

  function tick(now, dt) {
    // Time
    state.timeLeft -= dt / 1000;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      updateHud();
      levelUp();
      return;
    }
    // Spawn new activations
    if (now - state.lastSpawn >= state.spawnInterval) {
      state.lastSpawn = now;
      activateTile(now);
      // sometimes double-spawn at higher levels
      if (state.level >= 5 && Math.random() < 0.25) activateTile(now);
      if (state.level >= 9 && Math.random() < 0.20) activateTile(now);
    }
    // Expire tiles
    for (let i = 0; i < state.tileStates.length; i++) {
      const st = state.tileStates[i];
      if (st.active && now >= st.expiresAt) {
        // If safe tile missed -> small multiplier penalty
        if (!st.isForbidden) {
          state.multiplier = Math.max(0.5, state.multiplier - 0.03);
          state.streak = 0;
        }
        deactivateTile(i, { fade: true });
      }
    }
    updateHud();
  }

  function updateHud() {
    setText(lvlEl, String(state.level));
    setText(timeEl, state.timeLeft.toFixed(1));
    setText(scoreEl, String(state.score));
    setText(bestEl, String(state.best));
    const ratio = Math.max(0, Math.min(1, state.timeLeft / state.levelDuration));
    timefill.style.transform = `scaleX(${ratio})`;
    timebar.classList.toggle('warn', ratio < 0.5 && ratio >= 0.2);
    timebar.classList.toggle('crit', ratio < 0.2);
  }

  // ---------- Flow ----------
  function showCountdown(cb) {
    cdOv.classList.remove('hidden');
    let n = 3;
    cdNum.textContent = n;
    cdNum.style.animation = 'none'; void cdNum.offsetWidth;
    cdNum.style.animation = '';
    sfx.count();
    const step = () => {
      n--;
      if (n <= 0) {
        cdOv.classList.add('hidden');
        sfx.start();
        cb();
        return;
      }
      cdNum.textContent = n === 0 ? 'GO' : n;
      cdNum.style.animation = 'none'; void cdNum.offsetWidth;
      cdNum.style.animation = '';
      sfx.count();
      setTimeout(step, 700);
    };
    setTimeout(step, 700);
  }

  function startGame() {
    state.level = 1;
    state.score = 0;
    state.multiplier = 1.0;
    state.streak = 0;
    setBoardSize(state.boardSize);
    computeDifficulty();
    state.timeLeft = state.levelDuration;
    pickForbidden();
    buildBoard();
    updateHud();
    menu.classList.add('hidden');
    overOv.classList.add('hidden');
    pauseOv.classList.add('hidden');
    showCountdown(() => {
      state.running = true;
      state.paused = false;
      state.lastSpawn = performance.now() - state.spawnInterval; // immediate first spawn
      lastFrame = 0;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    });
  }

  function levelUp() {
    state.running = false;
    sfx.levelUp();
    state.level += 1;
    // bonus
    const lvlBonus = 250 + state.level * 50;
    state.score += lvlBonus;
    scaleBoardForLevel();
    computeDifficulty();
    state.timeLeft = state.levelDuration;
    state.multiplier = Math.min(3.0, state.multiplier + 0.15);
    pickForbidden();
    // rebuild board if dimension changed
    if (state.tiles.length !== state.cols * state.rows) buildBoard();
    else {
      // clear active states
      for (let i = 0; i < state.tileStates.length; i++) deactivateTile(i, { fade: true });
    }
    updateHud();
    showCountdown(() => {
      state.running = true;
      state.lastSpawn = performance.now() - state.spawnInterval;
      lastFrame = 0;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    });
  }

  function gameOver(reason) {
    state.running = false;
    if (rafId) cancelAnimationFrame(rafId);
    sfx.over();
    // shake + flash
    document.getElementById('app').classList.add('shake');
    flash.classList.add('on');
    setTimeout(() => {
      document.getElementById('app').classList.remove('shake');
      flash.classList.remove('on');
    }, 380);

    // High score persist
    if (state.score > state.best) {
      state.best = state.score;
      localStorage.setItem('nope_best', String(state.best));
    }
    if (state.level > state.bestLevel) {
      state.bestLevel = state.level;
      localStorage.setItem('nope_best_lvl', String(state.bestLevel));
    }

    overScore.textContent = state.score;
    overLvl.textContent = state.level;
    overBest.textContent = state.best;
    $('overSub').textContent = reason || 'You touched the forbidden color.';
    setTimeout(() => overOv.classList.remove('hidden'), 420);
  }

  function pause() {
    if (!state.running) return;
    state.paused = true;
    pauseOv.classList.remove('hidden');
  }
  function resume() {
    if (!state.running) return;
    state.paused = false;
    pauseOv.classList.add('hidden');
    state.lastSpawn = performance.now();
  }
  function goMenu() {
    state.running = false;
    state.paused = false;
    if (rafId) cancelAnimationFrame(rafId);
    pauseOv.classList.add('hidden');
    overOv.classList.add('hidden');
    refreshMenu();
    menu.classList.remove('hidden');
  }

  function refreshMenu() {
    menuBest.textContent = state.best;
    menuLvl.textContent = state.bestLevel;
    sndState.textContent = state.soundOn ? 'On' : 'Off';
    document.querySelectorAll('#sizeRow .chip').forEach(ch => {
      ch.classList.toggle('selected', ch.dataset.size === state.boardSize);
    });
  }

  // ---------- Bindings ----------
  document.querySelectorAll('#sizeRow .chip').forEach(ch => {
    ch.addEventListener('click', () => {
      setBoardSize(ch.dataset.size);
      refreshMenu();
      sfx.tap();
    });
  });
  $('btnStart').addEventListener('click', () => { ensureAudio(); startGame(); });
  $('btnSound').addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    localStorage.setItem('nope_sound', state.soundOn ? 'on' : 'off');
    refreshMenu();
    if (state.soundOn) sfx.tap();
  });
  $('btnPause').addEventListener('click', () => pause());
  $('btnMenu').addEventListener('click', () => goMenu());
  $('btnResume').addEventListener('click', () => resume());
  $('btnQuit').addEventListener('click', () => goMenu());
  $('btnAgain').addEventListener('click', () => startGame());
  $('btnHome').addEventListener('click', () => goMenu());

  // Keyboard accessibility
  document.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P') { state.running && (state.paused ? resume() : pause()); }
    if (e.key === 'Escape') { if (state.running) goMenu(); }
    if (e.key === 'Enter' && !state.running && !menu.classList.contains('hidden')) startGame();
    // Number keys 1..N to tap tiles
    if (/^[1-9]$/.test(e.key)) {
      const idx = parseInt(e.key, 10) - 1;
      if (state.tiles[idx]) onTileTap(idx, state.tiles[idx]);
    }
  });

  // Visibility -> pause
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state.running && !state.paused) pause();
  });

  // Init
  refreshMenu();
  updateHud();
})();
</script>
